<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Reading List">
<meta name="theme-color" content="#F8F4E9">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23F8F4E9'/%3E%3Ctext x='90' y='118' font-size='84' text-anchor='middle'%3E%F0%9F%93%96%3C/text%3E%3C/svg%3E">
<title>My Reading List</title>
<style>
  :root{
    --bg:#F8F4E9;
    --card:#FFFFFF;
    --panel:#FCF3DB;
    --accent:#FCA51D;
    --accent-dark:#E08E0B;
    --ink:#3B3226;
    --ink-soft:#8A7D68;
    --line:#EFE6D2;
    --reading:#4C9A6B;
    --want:#5B8DD9;
    --finished:#FCA51D;
    --dropped:#B0A390;
    --danger:#D9534F;
    --radius:14px;
    --shadow:0 2px 8px rgba(59,50,38,.08);
  }
  html[data-theme="dark"]{
    --bg:#211B14;
    --card:#2E261C;
    --panel:#3A2F21;
    --accent:#FCA51D;
    --accent-dark:#FFB84D;
    --ink:#F0E7D8;
    --ink-soft:#B3A48C;
    --line:#463A28;
    --reading:#5FB483;
    --want:#7AA6E8;
    --finished:#FCA51D;
    --dropped:#8C8070;
    --shadow:0 2px 10px rgba(0,0,0,.4);
  }
  html[data-theme="cinna"]{
    --bg:#E3EEF6;
    --card:#FBFDFF;
    --panel:#D5E6F2;
    --accent:#5FA8DC;
    --accent-dark:#4690C6;
    --ink:#33475C;
    --ink-soft:#75909F;
    --line:#C8DCEA;
    --reading:#57B287;
    --want:#A98BD1;
    --finished:#5FA8DC;
    --dropped:#A3B5C2;
    --shadow:0 3px 10px rgba(95,168,220,.2);
    --radius:22px;
  }
  html[data-theme="cinna"] .bc-stars{color:#F09CBB}
  html[data-theme="cinna"] h1 .book{color:#F09CBB}
  /* --- full cute mode (cinna only) --- */
  html[data-theme="cinna"] body{
    background-image:radial-gradient(circle at 18% 12%, rgba(255,255,255,.75) 0 42px, transparent 43px),
      radial-gradient(circle at 82% 30%, rgba(255,255,255,.6) 0 34px, transparent 35px),
      radial-gradient(circle at 45% 78%, rgba(255,255,255,.55) 0 48px, transparent 49px);
    background-attachment:fixed;
  }
  html[data-theme="cinna"] .icon-btn,
  html[data-theme="cinna"] .fld input,
  html[data-theme="cinna"] .fld textarea,
  html[data-theme="cinna"] .fld select,
  html[data-theme="cinna"] .seg button,
  html[data-theme="cinna"] .btn,
  html[data-theme="cinna"] .search-row input{border-radius:18px}
  html[data-theme="cinna"] .stat{border-radius:16px}
  html[data-theme="cinna"] .book-card{border-left-width:0;border:2px solid var(--line);position:relative}
  html[data-theme="cinna"] .book-card.st-reading{border-color:var(--reading)}
  html[data-theme="cinna"] .book-card.st-want{border-color:var(--want)}
  html[data-theme="cinna"] .book-card.st-finished{border-color:var(--finished)}
  html[data-theme="cinna"] .bc-badge{border-radius:999px;padding:4px 11px}
  html[data-theme="cinna"] .bc-type{border-radius:999px}
  html[data-theme="cinna"] .fab{
    border-radius:46% 54% 52% 48% / 58% 56% 44% 42%;
    width:64px;height:60px;font-size:1.7rem;
    background:linear-gradient(160deg,#7FBCE6,#5FA8DC);
    box-shadow:0 5px 16px rgba(95,168,220,.55), inset 0 -4px 0 rgba(255,255,255,.25);
  }
  html[data-theme="cinna"] .sheet{border-radius:28px 28px 0 0}
  html[data-theme="cinna"] .chip.active{box-shadow:0 2px 6px rgba(95,168,220,.4)}
  html[data-theme="cinna"] #toast{background:#F09CBB;color:#fff}
  html[data-theme="cinna"] .bc-progress span{background:linear-gradient(90deg,#7FBCE6,#F09CBB)}
  html[data-theme="cinna"] .empty .big::after{content:" \2601\FE0F"}
  html{color-scheme:light}
  html[data-theme="dark"]{color-scheme:dark}
  html[data-theme="cinna"]{color-scheme:light}
  body,header,.icon-btn,.chip,.book-card,.sheet,.fld input,.fld textarea,.fld select,.stat,.chart-card{
    transition:background-color .25s,color .25s,border-color .25s;
  }
  html[data-theme="dark"] .bc-badge.finished{color:#211B14}
  html[data-theme="dark"] .fab{box-shadow:0 4px 14px rgba(252,165,29,.35)}
  html[data-theme="dark"] #toast{background:#F0E7D8;color:#211B14}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:Georgia,'Times New Roman',serif;
    background:var(--bg);
    color:var(--ink);
    font-size:16px;
    line-height:1.45;
  }
  button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:20;
    background:var(--bg);
    border-bottom:2px solid var(--accent);
    padding:calc(14px + env(safe-area-inset-top, 0px)) 16px 10px;
  }
  .hdr-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  h1{font-size:1.2rem;font-weight:700;letter-spacing:.3px;white-space:nowrap;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
  h1 .book{color:var(--accent)}
  .btn-theme{flex:0 0 auto}
  .hdr-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%}
  .hdr-btns .icon-btn{text-align:center}
  .icon-btn{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:7px 11px;cursor:pointer;font-size:.85rem;color:var(--ink-soft);
    transition:background .15s;
  }
  .icon-btn:active{background:var(--line)}
  .icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* search + filters */
  .search-row{margin-top:10px}
  .search-row input{
    width:100%;padding:9px 14px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);font-size:.95rem;
  }
  .search-row input:focus{outline:2px solid var(--accent);border-color:transparent}
  .chips{
    display:flex;gap:7px;margin-top:10px;overflow-x:auto;padding-bottom:4px;
    scrollbar-width:none;
  }
  .chips::-webkit-scrollbar{display:none}
  .chips{
    -webkit-mask-image:linear-gradient(to right, black 0%, black calc(100% - 34px), transparent 100%);
    mask-image:linear-gradient(to right, black 0%, black calc(100% - 34px), transparent 100%);
  }
  .chips.at-end{-webkit-mask-image:none;mask-image:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:5px 13px;font-size:.82rem;cursor:pointer;
    color:var(--ink-soft);white-space:nowrap;
  }
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .chip .cnt{opacity:.75;font-size:.75rem;margin-left:3px}
  .type-chips{margin-top:6px}
  .type-chips .chip.active{background:var(--ink);border-color:var(--ink)}
  .bc-type{
    flex:0 0 auto;font-size:.66rem;font-weight:700;letter-spacing:.4px;
    padding:3px 8px;border-radius:6px;text-transform:uppercase;
    font-family:Verdana,sans-serif;color:#fff;border:1px solid transparent;
  }
  .bc-type.tp-novel{background:#E08E0B}
  .bc-type.tp-manhwa{background:#5B8DD9}
  .bc-type.tp-manhua{background:#4C9A6B}
  .bc-type.tp-manga{background:#C97BB2}
  .type-chips .chip.active.tc-novel{background:#E08E0B;border-color:#E08E0B;color:#fff}
  .type-chips .chip.active.tc-manhwa{background:#5B8DD9;border-color:#5B8DD9;color:#fff}
  .type-chips .chip.active.tc-manhua{background:#4C9A6B;border-color:#4C9A6B;color:#fff}
  .type-chips .chip.active.tc-manga{background:#C97BB2;border-color:#C97BB2;color:#fff}

  .sort-row{display:flex;align-items:center;gap:8px;margin-top:8px}
  .sort-row label{font-size:.78rem;color:var(--ink-soft)}
  .sort-row select{
    flex:1;padding:6px 10px;border:1px solid var(--line);border-radius:8px;
    background:var(--card);font-size:.85rem;
  }

  /* ---------- List ---------- */
  main{padding:14px 14px 110px;max-width:640px;margin:0 auto}
  .empty{
    text-align:center;color:var(--ink-soft);padding:60px 20px;
  }
  .empty .big{font-size:2.6rem;margin-bottom:10px}
  .empty p{font-size:.92rem}

  .book-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 14px 12px;margin-bottom:12px;border-left:5px solid var(--dropped);
    cursor:pointer;transition:transform .1s;
  }
  .book-card:active{transform:scale(.99)}
  .book-card.st-reading{border-left-color:var(--reading)}
  .book-card.st-want{border-left-color:var(--want)}
  .book-card.st-finished{border-left-color:var(--finished)}
  .bc-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .bc-title{font-weight:700;font-size:1.02rem;line-height:1.3}
  .bc-title a{color:var(--accent-dark);text-decoration:none;border-bottom:1px dotted var(--accent)}
  .bc-badge{
    flex:0 0 auto;font-size:.68rem;font-weight:700;letter-spacing:.4px;
    padding:3px 9px;border-radius:999px;color:#fff;text-transform:uppercase;
    font-family:Verdana,sans-serif;
  }
  .bc-badge.reading{background:var(--reading)}
  .bc-badge.want{background:var(--want)}
  .bc-badge.finished{background:var(--finished)}
  .bc-badge.dropped{background:var(--dropped)}
  .bc-author{font-size:.85rem;color:var(--ink-soft);margin-top:2px;font-style:italic}
  .bc-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;align-items:center}
  .bc-stars{color:var(--accent);font-size:.95rem;letter-spacing:2px}
  .bc-stars .off{color:var(--line)}
  .bc-ch{
    font-size:.78rem;color:var(--ink-soft);background:var(--panel);
    border-radius:6px;padding:2px 8px;font-family:Verdana,sans-serif;
  }
  .bc-tag{cursor:pointer;transition:background .15s,color .15s}
  .bc-tag:hover{background:var(--accent);color:#fff}
  .bc-progress{height:5px;background:var(--line);border-radius:3px;margin-top:9px;overflow:hidden}
  .bc-progress span{display:block;height:100%;background:var(--accent);border-radius:3px}
  .bc-dates{
    margin-top:8px;font-size:.74rem;color:var(--ink-soft);
    font-family:Verdana,sans-serif;letter-spacing:.2px;
  }
  .bc-notes{
    margin-top:8px;font-size:.85rem;color:var(--ink-soft);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;bottom:calc(22px + env(safe-area-inset-bottom, 0px));right:20px;z-index:25;
    width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
    background:var(--accent);color:#fff;font-size:2rem;line-height:1;
    box-shadow:0 4px 14px rgba(252,165,29,.5);
    display:flex;align-items:center;justify-content:center;padding-bottom:4px;
  }
  .fab:active{background:var(--accent-dark)}
  .fab:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  /* ---------- Modal / Sheet ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(59,50,38,.45);z-index:30;
    display:none;align-items:flex-end;justify-content:center;
  }
  .overlay.open{display:flex}
  .sheet{
    background:var(--bg);width:100%;max-width:640px;
    border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;
    padding:18px 18px calc(26px + env(safe-area-inset-bottom, 0px));animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  @media (prefers-reduced-motion:reduce){.sheet{animation:none}}
  .sheet h2{font-size:1.15rem;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .sheet .close-x{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink-soft);padding:4px 8px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:.78rem;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-family:Verdana,sans-serif}
  .fld input,.fld textarea,.fld select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    background:var(--card);font-size:.95rem;
  }
  .fld input:focus,.fld textarea:focus,.fld select:focus{outline:2px solid var(--accent);border-color:transparent}
  .fld textarea{min-height:80px;resize:vertical}
  .fld-row{display:flex;gap:10px}
  .fld-row .fld{flex:1}

  /* status segmented */
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .seg button{
    border:1px solid var(--line);background:var(--card);border-radius:9px;
    padding:8px 4px;font-size:.75rem;cursor:pointer;color:var(--ink-soft);
    font-family:Verdana,sans-serif;
  }
  .seg button.sel-want{background:var(--want);border-color:var(--want);color:#fff;font-weight:700}
  .seg button.sel-reading{background:var(--reading);border-color:var(--reading);color:#fff;font-weight:700}
  .seg button.sel-finished{background:var(--finished);border-color:var(--finished);color:#fff;font-weight:700}
  .seg button.sel-dropped{background:var(--dropped);border-color:var(--dropped);color:#fff;font-weight:700}
  .seg button.sel-type{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:700}

  /* star input */
  .star-input{display:flex;gap:6px;align-items:center}
  .star-input button{
    background:none;border:none;font-size:1.7rem;cursor:pointer;color:var(--line);padding:2px;
  }
  .star-input button.on{color:var(--accent)}
  .star-input .clear-r{font-size:.75rem;color:var(--ink-soft);margin-left:6px;background:none;border:none;cursor:pointer;text-decoration:underline}
  .star-input button.half{
    background:linear-gradient(90deg,var(--accent) 50%,var(--line) 50%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
  .star-input .zero-btn{
    font-size:.8rem;font-family:Verdana,sans-serif;font-weight:700;
    border:1px solid var(--line);border-radius:8px;padding:4px 9px;
    color:var(--ink-soft);background:var(--card);margin-right:4px;
  }
  .star-input .zero-btn.on{background:var(--dropped);border-color:var(--dropped);color:#fff}
  .rating-hint{font-size:.72rem;color:var(--ink-soft);margin-top:4px}
  .st-half{
    background:linear-gradient(90deg,currentColor 50%,var(--line) 50%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .bc-zero{
    flex:0 0 auto;font-size:.7rem;font-weight:700;font-family:Verdana,sans-serif;
    padding:2px 8px;border-radius:999px;background:var(--dropped);color:#fff;
  }
  .vw-zero{
    margin:2px 0 12px;padding:10px 13px;border-left:4px solid var(--dropped);
    background:var(--panel);border-radius:0 10px 10px 0;
    font-style:italic;font-size:.88rem;color:var(--ink-soft);
  }

  .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .btn{
    flex:1;padding:12px;border-radius:11px;border:none;cursor:pointer;
    font-weight:700;font-size:.95rem;
  }
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:active{background:var(--accent-dark)}
  .btn-ghost{background:var(--panel);color:var(--ink-soft);border:1px solid var(--line)}
  .btn-danger{background:none;border:none;color:var(--danger);font-size:.85rem;margin-top:14px;width:100%;cursor:pointer;text-decoration:underline;padding:8px}

  .review-ta{min-height:160px;border-radius:0 0 10px 10px !important;border-top:none !important}
  .rev-toolbar{
    display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);
    border-bottom:none;border-radius:10px 10px 0 0;padding:6px 8px;align-items:center;
  }
  .rev-toolbar button{
    background:var(--card);border:1px solid var(--line);border-radius:7px;
    padding:4px 11px;font-size:.82rem;cursor:pointer;color:var(--ink);
  }
  .rev-toolbar button:active{background:var(--line)}
  .rev-toolbar .rev-pv{margin-left:auto;color:var(--accent-dark);font-weight:700}
  .rev-toolbar .rev-pv.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .rev-preview{min-height:160px;border-radius:0 0 10px 10px;border-top:none}
  .vw-review h4{font-size:1rem;margin:4px 0 8px;border-bottom:1px solid var(--line);padding-bottom:4px}
  .vw-review ul{margin:0 0 10px 20px;padding:0}
  .vw-review li{margin-bottom:4px}
  .bc-rev{
    flex:0 0 auto;font-size:.72rem;color:var(--ink-soft);
  }
  .vw-review{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:13px 15px;font-size:.92rem;line-height:1.6;
  }
  .vw-review p{margin:0 0 10px}
  .vw-review p:last-child{margin-bottom:0}
  .copy-rev{
    background:none;border:none;color:var(--accent-dark);font-size:.78rem;
    cursor:pointer;text-decoration:underline;padding:2px 4px;margin-left:8px;
  }
  .storage-bar{height:12px;background:var(--panel);border-radius:6px;overflow:hidden;margin-top:8px}
  .storage-bar span{display:block;height:100%;background:var(--accent);border-radius:6px}
  .storage-txt{font-size:.82rem;color:var(--ink-soft);margin-top:7px}
  .lg-item{cursor:pointer;border-radius:7px;padding:2px 5px;margin-left:-5px}
  .lg-item:hover{background:var(--panel)}
  .hbar-click{cursor:pointer;border-radius:8px;padding:4px 6px;margin:0 -6px 4px}
  .hbar-click:hover{background:var(--panel)}
  .hbar-click .hbar{margin-bottom:0}
  .peek-row{
    display:flex;align-items:center;gap:10px;padding:10px 4px;
    border-bottom:1px solid var(--line);cursor:pointer;border-radius:8px;
  }
  .peek-row:hover{background:var(--panel)}
  .peek-row:last-child{border-bottom:none}
  .peek-row .pk-title{flex:1;font-weight:700;font-size:.92rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .peek-row .bc-stars{font-size:.82rem}
  .peek-more{font-size:.8rem;color:var(--ink-soft);padding:8px 4px 0;text-align:center}
  .vw-title{font-size:1.2rem;font-weight:700;line-height:1.3;margin-bottom:2px}
  .vw-title a{color:var(--accent-dark);text-decoration:none;border-bottom:1px dotted var(--accent)}
  .vw-author{font-style:italic;color:var(--ink-soft);margin-bottom:10px}
  .vw-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .vw-grid{display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:.9rem;margin-bottom:12px}
  .vw-grid dt{color:var(--ink-soft);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;font-family:Verdana,sans-serif;padding-top:3px}
  .vw-grid dd{margin:0}
  .vw-tags{display:flex;gap:6px;flex-wrap:wrap}
  .vw-notes{
    background:var(--panel);border-radius:12px;padding:11px 13px;font-size:.9rem;
    white-space:pre-wrap;line-height:1.5;
  }
  .vw-notes-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);font-family:Verdana,sans-serif;margin:12px 0 5px}
  .seg-share button.sel-share{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .share-count{font-size:.85rem;color:var(--ink-soft);margin:2px 2px 6px}
  #printArea{display:none}
  @media print{
    body > *{display:none !important}
    body > #printArea{display:block !important}
    body{background:#fff}
    #printArea{font-family:Georgia,serif;color:#222;padding:10px}
    #printArea h1{font-size:1.15rem;border-bottom:2px solid #FCA51D;padding-bottom:6px;margin-bottom:3px}
    #printArea .pr-sub{font-size:.7rem;color:#777;margin-bottom:10px}
    #printArea .pr-item{padding:4px 0;border-bottom:1px solid #e4e4e4;page-break-inside:avoid}
    #printArea .pr-title{font-weight:bold;font-size:.82rem}
    #printArea .pr-meta{font-size:.68rem;color:#666;margin-top:1px}
    #printArea .pr-stars{color:#FCA51D;letter-spacing:1px;font-size:.75rem}
    #printArea .pr-notes{font-size:.68rem;color:#555;margin-top:1px;font-style:italic}
    #printArea.pr-titleonly{column-count:2;column-gap:28px}
    #printArea.pr-titleonly h1,#printArea.pr-titleonly .pr-sub{column-span:all}
  }

  /* toast */
  #toast{
    position:fixed;bottom:95px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:9px 18px;border-radius:999px;
    font-size:.85rem;opacity:0;pointer-events:none;transition:all .25s;z-index:50;
    white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* stats strip */
  .stats{
    display:flex;gap:8px;margin-bottom:14px;
  }
  .stat{
    flex:1;background:var(--panel);border-radius:10px;padding:8px 6px;text-align:center;
  }
  .stat .n{font-weight:700;font-size:1.1rem;color:var(--accent-dark)}
  .stat .l{font-size:.66rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;font-family:Verdana,sans-serif}

  #statsPanel{margin-bottom:16px}
  .chart-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px;margin-bottom:12px;
  }
  .chart-card h3{
    font-size:.78rem;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft);
    font-family:Verdana,sans-serif;margin-bottom:10px;border-bottom:1px solid var(--line);padding-bottom:6px;
  }
  .donut-wrap{display:flex;align-items:center;gap:16px}
  .donut-wrap svg{flex:0 0 auto}
  .legend{flex:1;font-size:.8rem;max-width:250px}
  .legend div{display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .legend .dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .legend .lv{margin-left:auto;color:var(--ink-soft);font-family:Verdana,sans-serif;font-size:.72rem}
  .hbar{margin-bottom:8px}
  .hbar .hb-label{display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px}
  .hbar .hb-label .n{color:var(--ink-soft);font-family:Verdana,sans-serif;font-size:.72rem}
  .hbar .hb-track{height:12px;background:var(--panel);border-radius:6px;overflow:hidden}
  .hbar .hb-fill{height:100%;border-radius:6px;background:var(--accent)}
  .vbars{display:flex;align-items:flex-end;gap:10px;height:110px;padding-top:6px;max-width:340px}
  .vbar{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
  .vbar .vb-fill{width:70%;max-width:44px;background:var(--accent);border-radius:5px 5px 0 0;min-height:2px}
  .vbar .vb-n{font-size:.7rem;color:var(--ink-soft);font-family:Verdana,sans-serif;margin:3px 0 2px}
  .vbar .vb-l{font-size:.78rem;color:var(--accent)}
  .btnStats-on{background:var(--accent) !important;color:#fff !important;border-color:var(--accent) !important}
  /* centered dialogs on desktop */
  @media(min-width:700px){
    .overlay{align-items:center;padding:24px}
    .sheet{border-radius:18px;max-width:560px;max-height:86vh;
      animation:popIn .18s ease}
  }
  @keyframes popIn{from{transform:scale(.96);opacity:.5}to{transform:scale(1);opacity:1}}
  html[data-theme="cinna"] .sheet{border-radius:28px 28px 0 0}
  @media(min-width:700px){
    html[data-theme="cinna"] .sheet{border-radius:28px}
  }

  /* ---------- desktop layout ---------- */
  .hdr-inner{max-width:1160px;margin:0 auto}
  @media(min-width:700px){
    h1{font-size:1.35rem;flex:0 1 auto}
    .hdr-btns{display:flex;width:auto;margin-left:auto}
    .hdr-row{flex-wrap:nowrap}
    .btn-theme{order:3}
    /* single filter row: chips + type chips + sort */
    .hdr-inner{display:flex;flex-wrap:wrap;align-items:center;column-gap:20px}
    .hdr-row,.search-row{width:100%}
    .chips{flex:0 1 auto;overflow-x:visible;flex-wrap:wrap;row-gap:6px;padding-bottom:0;
      -webkit-mask-image:none;mask-image:none}
    .type-chips{margin-top:10px}
    .sort-row{flex:1 0 auto;justify-content:flex-end;min-width:230px}
    .sort-row select{flex:0 1 auto;min-width:180px}
    .chips + .type-chips{position:relative;padding-left:20px}
    .chips + .type-chips::before{
      content:"";position:absolute;left:0;top:4px;bottom:4px;width:1px;background:var(--line);
    }
  }
  /* sidebar dashboard from 980px */
  @media(min-width:980px){
    main{max-width:1160px;display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start;padding-top:20px}
    #sideCol{position:sticky;top:150px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stat{padding:12px 8px}
    .stat .n{font-size:1.4rem}
    #statsPanel{display:block !important;margin-bottom:0}
    #list .book-card{margin-bottom:14px}
    .fab{right:36px;bottom:32px}
  }
  /* stats-only mode */
  body.stats-mode #mainCol{display:none}
  body.stats-mode .fab{display:none}
  @media(min-width:980px){
    body.stats-mode main{display:block}
    body.stats-mode #sideCol{position:static}
    body.stats-mode .stats{grid-template-columns:repeat(4,1fr)}
    body.stats-mode #statsPanel{display:grid !important;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;align-items:start}
    body.stats-mode .chart-card{margin-bottom:0}
  }

  /* extra-wide: two-column cards */
  @media(min-width:1420px){
    main{max-width:1420px}
    .hdr-row,.search-row,.chips,.sort-row{max-width:1420px}
    #list{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
    #list .book-card{margin-bottom:0}
    #list .empty{grid-column:1 / -1}
  }
</style>
</head>
<body>

<header>
<div class="hdr-inner">
  <div class="hdr-row">
    <h1><span class="book" id="hdrIcon">&#128214;</span> My Reading List</h1>
    <button class="icon-btn btn-theme" id="btnTheme" title="Light / dark mode" aria-label="Toggle dark mode">&#9789;</button>
    <div class="hdr-btns">
      <button class="icon-btn" id="btnStats" title="Charts &amp; stats">Stats</button>
      <button class="icon-btn" id="btnShare" title="Share a list">Share</button>
      <button class="icon-btn" id="btnExport" title="Export backup">Export</button>
      <button class="icon-btn" id="btnImport" title="Import backup">Import</button>
    </div>
  </div>
  <div class="search-row">
    <input type="search" id="search" placeholder="Search title, author, notes&hellip;">
  </div>
  <div class="chips" id="chips"></div>
  <div class="chips type-chips" id="typeChips"></div>
  <div class="sort-row">
    <label for="sortSel">Sort</label>
    <select id="sortSel">
      <option value="updated">Recently updated</option>
      <option value="added">Recently added</option>
      <option value="title">Title A&ndash;Z</option>
      <option value="rating">Rating (high first)</option>
      <option value="progress">Progress %</option>
    </select>
  </div>
</div>
</header>

<main>
  <div id="sideCol">
    <div class="stats" id="stats"></div>
    <section id="statsPanel" style="display:none"></section>
  </div>
  <div id="mainCol">
    <div id="list"></div>
  </div>
</main>

<button class="fab" id="fab" aria-label="Add a story">+</button>

<!-- Add / Edit sheet -->
<div class="overlay" id="overlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2><span id="sheetTitle">Add a story</span><button class="close-x" id="closeSheet" aria-label="Close">&times;</button></h2>

    <div class="fld">
      <label for="fTitle">Title *</label>
      <input id="fTitle" type="text" placeholder="e.g. Agreement Mark">
    </div>
    <div class="fld">
      <label for="fAuthor">Author</label>
      <input id="fAuthor" type="text" placeholder="Author name">
    </div>
    <div class="fld">
      <label for="fLink">Link (where you read it)</label>
      <input id="fLink" type="url" placeholder="https://&hellip;">
    </div>
    <div class="fld">
      <label>Type</label>
      <div class="seg" id="segType">
        <button data-tp="novel">Novel</button>
        <button data-tp="manhwa">Manhwa</button>
        <button data-tp="manhua">Manhua</button>
        <button data-tp="manga">Manga</button>
      </div>
    </div>
    <div class="fld">
      <label>Status</label>
      <div class="seg" id="segStatus">
        <button data-st="want">Want to read</button>
        <button data-st="reading">Reading</button>
        <button data-st="finished">Finished</button>
        <button data-st="dropped">Dropped</button>
      </div>
    </div>
    <div class="fld-row">
      <div class="fld">
        <label for="fChCur">Current chapter</label>
        <input id="fChCur" type="number" min="0" inputmode="numeric" placeholder="0">
      </div>
      <div class="fld">
        <label for="fChTot">Total chapters</label>
        <input id="fChTot" type="number" min="0" inputmode="numeric" placeholder="?">
      </div>
    </div>
    <div class="fld-row">
      <div class="fld">
        <label for="fStart">Date started</label>
        <input id="fStart" type="date">
      </div>
      <div class="fld">
        <label for="fEnd">Date finished</label>
        <input id="fEnd" type="date">
      </div>
    </div>
    <div class="fld">
      <label>Rating</label>
      <div class="star-input" id="starInput">
        <button class="zero-btn" id="zeroBtn" title="Zero stars. We were all rooting for you.">0&#9733;</button>
        <button data-v="1">&#9733;</button><button data-v="2">&#9733;</button><button data-v="3">&#9733;</button><button data-v="4">&#9733;</button><button data-v="5">&#9733;</button>
        <button class="clear-r" id="clearRating">clear</button>
      </div>
      <div class="rating-hint">Tap a star twice for a half (&#9733;&frac12;)</div>
    </div>
    <div class="fld">
      <label for="fGenre">Genre / tags (comma separated)</label>
      <input id="fGenre" type="text" list="genreList" placeholder="e.g. omegaverse, transmigration, fluff">
      <datalist id="genreList"></datalist>
    </div>
    <div class="fld">
      <label for="fNotes">Notes</label>
      <textarea id="fNotes" placeholder="Quick thoughts, warnings, where you left off&hellip;"></textarea>
    </div>
    <div class="fld">
      <label for="fReview">Full review (optional)</label>
      <div class="rev-toolbar" id="revToolbar">
        <button type="button" data-md="bold" title="Bold"><b>B</b></button>
        <button type="button" data-md="italic" title="Italic"><i>I</i></button>
        <button type="button" data-md="heading" title="Heading">H</button>
        <button type="button" data-md="list" title="Bullet list">&bull; List</button>
        <button type="button" id="revPreviewBtn" class="rev-pv" title="Preview">Preview</button>
      </div>
      <textarea id="fReview" class="review-ta" placeholder="Your extensive review&hellip;"></textarea>
      <div id="revPreview" class="vw-review rev-preview" style="display:none"></div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="btnCancel">Cancel</button>
      <button class="btn btn-primary" id="btnSave">Save</button>
    </div>
    <button class="btn-danger" id="btnDelete" style="display:none">Delete this story</button>
  </div>
</div>

<!-- View sheet -->
<div class="overlay" id="viewOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2><span>Story details</span><button class="close-x" id="closeView" aria-label="Close">&times;</button></h2>
    <div id="viewBody"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="btnViewClose">Close</button>
      <button class="btn btn-primary" id="btnViewEdit">Edit</button>
    </div>
  </div>
</div>

<!-- Peek (stats drill-down) sheet -->
<div class="overlay" id="peekOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2><span id="peekTitle">Stories</span><button class="close-x" id="closePeek" aria-label="Close">&times;</button></h2>
    <div id="peekBody"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="btnPeekClose">Close</button>
      <button class="btn btn-primary" id="btnPeekAll">Show all</button>
    </div>
  </div>
</div>

<!-- Share sheet -->
<div class="overlay" id="shareOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <h2><span>Share a list</span><button class="close-x" id="closeShare" aria-label="Close">&times;</button></h2>
    <div class="fld">
      <label>What do you want to show?</label>
      <div class="seg seg-share" id="segShare">
        <button data-sh="finished" class="sel-share">Finished</button>
        <button data-sh="reading">Reading now</button>
        <button data-sh="loved">Loved (4&#9733;+)</button>
        <button data-sh="want">Want to read</button>
      </div>
    </div>
    <div class="fld">
      <label>How much detail?</label>
      <div class="seg seg-share" id="segDetail">
        <button data-dt="title">Title only</button>
        <button data-dt="tags">+ Tags</button>
        <button data-dt="notes">+ Notes</button>
        <button data-dt="all" class="sel-share">Everything</button>
      </div>
    </div>
    <div class="fld">
      <label>Which year?</label>
      <div class="chips" id="shareYears"></div>
    </div>
    <p class="share-count" id="shareCount"></p>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="btnSharePdf">Print / PDF</button>
      <button class="btn btn-primary" id="btnShareImg">Save as image</button>
    </div>
  </div>
</div>
<div id="printArea"></div>

<input type="file" id="fileImport" accept=".json,application/json" style="display:none">
<div id="toast"></div>

<script>
(function(){
  'use strict';
  var KEY = 'reading_list_v1';
  var THEME_KEY = 'reading_list_theme';
  var STATUSES = { want:'Want to read', reading:'Reading', finished:'Finished', dropped:'Dropped' };
  var TYPES = { novel:'Novel', manhwa:'Manhwa', manhua:'Manhua', manga:'Manga' };
  var ST_COLORS = { reading:'#4C9A6B', want:'#5B8DD9', finished:'#FCA51D', dropped:'#B0A390' };
  var TP_COLORS = { novel:'#E08E0B', manhwa:'#5B8DD9', manhua:'#4C9A6B', manga:'#C97BB2' };
  var statsOpen = false;

  var books = load();
  var editId = null;          // null = adding new
  var curStatus = 'want';     // status selected in sheet
  var curType = 'novel';      // type selected in sheet
  var typeFilter = 'all';
  var curRating = 0;
  var filter = 'all';
  var query = '';

  /* ---------- storage ---------- */
  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      var arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(books)); }
    catch(e){ toast('Could not save (storage full?)'); }
  }
  function uid(){
    return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }

  /* ---------- helpers ---------- */
  function $(id){ return document.getElementById(id); }
  function esc(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }
  function toast(msg){
    var t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._tm);
    t._tm = setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }
  function fmtDate(iso){
    if(!iso) return '';
    var parts = iso.split('-');
    if(parts.length !== 3) return iso;
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var m = parseInt(parts[1],10);
    return months[m-1] + ' ' + parseInt(parts[2],10) + ', ' + parts[0];
  }
  function daysBetween(a, b){
    var d1 = new Date(a + 'T00:00:00'), d2 = new Date(b + 'T00:00:00');
    if(isNaN(d1) || isNaN(d2)) return null;
    var n = Math.round((d2 - d1) / 86400000) + 1; // inclusive
    return n > 0 ? n : null;
  }
  function datesLine(b){
    if(!b.dateStart && !b.dateEnd) return '';
    var bits = [];
    if(b.dateStart) bits.push('Started ' + fmtDate(b.dateStart));
    if(b.dateEnd) bits.push('Finished ' + fmtDate(b.dateEnd));
    var txt = bits.join(' &middot; ');
    if(b.dateStart && b.dateEnd){
      var n = daysBetween(b.dateStart, b.dateEnd);
      if(n === 1) txt += ' &middot; in 1 day!';
      else if(n) txt += ' &middot; ' + n + ' days';
    }
    return '<div class="bc-dates">' + txt + '</div>';
  }
  function pct(b){
    if(!b.chTot || b.chTot <= 0) return null;
    var p = Math.min(100, Math.round((b.chCur || 0) / b.chTot * 100));
    return isNaN(p) ? null : p;
  }

  /* ---------- render ---------- */
  function renderChips(){
    var counts = { all: books.length, want:0, reading:0, finished:0, dropped:0 };
    books.forEach(function(b){ if(counts[b.status] != null) counts[b.status]++; });
    var order = ['all','reading','want','finished','dropped'];
    var labels = { all:'All', reading:'Reading', want:'Want to read', finished:'Finished', dropped:'Dropped' };
    $('chips').innerHTML = order.map(function(k){
      return '<button class="chip'+(filter===k?' active':'')+'" data-f="'+k+'">'
        + labels[k] + '<span class="cnt">'+counts[k]+'</span></button>';
    }).join('');
  }

  function renderTypeChips(){
    var counts = { all: books.length, novel:0, manhwa:0, manhua:0, manga:0 };
    books.forEach(function(b){ var t = b.type || 'novel'; if(counts[t] != null) counts[t]++; });
    var order = ['all','novel','manhwa','manhua','manga'];
    $('typeChips').innerHTML = order.map(function(k){
      return '<button class="chip tc-'+k+(typeFilter===k?' active':'')+'" data-t="'+k+'">'
        + (k==='all' ? 'All types' : TYPES[k]) + '<span class="cnt">'+counts[k]+'</span></button>';
    }).join('');
  }

  function renderStats(){
    var reading=0, fin=0, chapters=0;
    books.forEach(function(b){
      if(b.status==='reading') reading++;
      if(b.status==='finished') fin++;
      chapters += (b.chCur||0);
    });
    $('stats').innerHTML =
      '<div class="stat"><div class="n">'+books.length+'</div><div class="l">Stories</div></div>'
      +'<div class="stat"><div class="n">'+reading+'</div><div class="l">Reading</div></div>'
      +'<div class="stat"><div class="n">'+fin+'</div><div class="l">Finished</div></div>'
      +'<div class="stat"><div class="n">'+chapters+'</div><div class="l">Chapters read</div></div>';
  }

  function starsHtml(r){
    var out = '';
    var full = Math.floor(r), half = (r % 1) >= 0.5;
    for(var i=1;i<=5;i++){
      if(i <= full) out += '<span>&#9733;</span>';
      else if(half && i === full + 1) out += '<span class="st-half">&#9733;</span>';
      else out += '<span class="off">&#9733;</span>';
    }
    return out;
  }
  function starsText(b){
    if(b.zero) return '0\u2605';
    if(!b.rating) return '';
    var t = Array(Math.floor(b.rating)+1).join('\u2605');
    if(b.rating % 1) t += '\u00BD';
    return t;
  }

  function sorted(list){
    var mode = $('sortSel').value;
    var arr = list.slice();
    if(mode==='title') arr.sort(function(a,b){ return a.title.localeCompare(b.title); });
    else if(mode==='rating') arr.sort(function(a,b){ return (b.rating||0)-(a.rating||0); });
    else if(mode==='added') arr.sort(function(a,b){ return (b.added||0)-(a.added||0); });
    else if(mode==='progress') arr.sort(function(a,b){ return (pct(b)||0)-(pct(a)||0); });
    else arr.sort(function(a,b){ return (b.updated||0)-(a.updated||0); });
    return arr;
  }

  function renderList(){
    var q = query.toLowerCase();
    var shown = books.filter(function(b){
      if(filter !== 'all' && b.status !== filter) return false;
      if(typeFilter !== 'all' && (b.type || 'novel') !== typeFilter) return false;
      if(q){
        var hay = (b.title+' '+(b.author||'')+' '+(b.notes||'')+' '+(b.review||'')+' '+(b.genre||'')).toLowerCase();
        if(hay.indexOf(q) === -1) return false;
      }
      return true;
    });
    shown = sorted(shown);

    if(!shown.length){
      $('list').innerHTML = '<div class="empty"><div class="big">&#128218;</div><p>'
        + (books.length ? 'Nothing matches this filter.' : 'Your shelf is empty.<br>Tap <b>+</b> to add your first story!')
        + '</p></div>';
      return;
    }

    $('list').innerHTML = shown.map(function(b){
      var p = pct(b);
      var chTxt = '';
      if(b.chCur || b.chTot){
        chTxt = '<span class="bc-ch">Ch. '+(b.chCur||0)+(b.chTot?' / '+b.chTot:'')+(p!=null?' &middot; '+p+'%':'')+'</span>';
      }
      var titleHtml = b.link
        ? '<a href="'+esc(b.link)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(b.title)+'</a>'
        : esc(b.title);
      return '<div class="book-card st-'+esc(b.status)+'" data-id="'+esc(b.id)+'">'
        + '<div class="bc-top"><div class="bc-title">'+titleHtml+'</div>'
        + (b.review ? '<span class="bc-rev" title="Has a full review">&#128221;</span>' : '')
        + '<span class="bc-type tp-'+esc(b.type||'novel')+'">'+(TYPES[b.type]||'Novel')+'</span>'
        + '<span class="bc-badge '+esc(b.status)+'">'+STATUSES[b.status]+'</span></div>'
        + (b.author ? '<div class="bc-author">'+esc(b.author)+'</div>' : '')
        + '<div class="bc-meta">'
        + (b.zero ? '<span class="bc-zero" title="We were all rooting for you">0&#9733;</span>' : (b.rating ? '<span class="bc-stars">'+starsHtml(b.rating)+'</span>' : ''))
        + chTxt
        + (b.genre ? b.genre.split(',').map(function(g){ g=g.trim(); return g?'<span class="bc-ch bc-tag" data-tag="'+esc(g)+'" role="button" title="Show all &quot;'+esc(g)+'&quot; stories">'+esc(g)+'</span>':''; }).join('') : '')
        + '</div>'
        + (p!=null ? '<div class="bc-progress"><span style="width:'+p+'%"></span></div>' : '')
        + datesLine(b)
        + (b.notes ? '<div class="bc-notes">'+esc(b.notes)+'</div>' : '')
        + '</div>';
    }).join('');
  }

  function allGenres(){
    var map = {};
    books.forEach(function(b){
      (b.genre||'').split(',').forEach(function(g){
        g = g.trim(); if(!g) return;
        var k = g.toLowerCase();
        if(!map[k]) map[k] = { label:g, n:0 };
        map[k].n++;
      });
    });
    return Object.keys(map).map(function(k){ return map[k]; })
      .sort(function(a,b){ return b.n - a.n; });
  }
  function refreshGenreList(){
    $('genreList').innerHTML = allGenres().map(function(g){
      return '<option value="'+esc(g.label)+'">';
    }).join('');
  }

  function donutSvg(parts, size){
    var total = parts.reduce(function(a,p){ return a+p.n; },0);
    if(!total) return '';
    var r = 34, c = 2*Math.PI*r, off = 0;
    var segs = parts.map(function(p){
      var frac = p.n/total, len = frac*c;
      var seg = '<circle r="'+r+'" cx="45" cy="45" fill="none" stroke="'+p.color+'" stroke-width="16" '
        +'stroke-dasharray="'+len+' '+(c-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 45 45)"/>';
      off += len;
      return seg;
    }).join('');
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 90 90" role="img">'
      + segs
      + '<text x="45" y="49" text-anchor="middle" font-size="16" font-weight="bold" fill="currentColor" style="color:var(--ink)">'+total+'</text>'
      + '</svg>';
  }
  function legendHtml(parts, total, kind){
    return '<div class="legend">' + parts.map(function(p){
      var pctv = total ? Math.round(p.n/total*100) : 0;
      return '<div class="lg-item" data-kind="'+kind+'" data-key="'+esc(p.key)+'" title="See these stories">'
        +'<span class="dot" style="background:'+p.color+'"></span>'+esc(p.label)
        +'<span class="lv">'+p.n+' &middot; '+pctv+'%</span></div>';
    }).join('') + '</div>';
  }

  function renderStatsPanel(){
    var el = $('statsPanel');
    document.body.classList.toggle('stats-mode', statsOpen);
    el.style.display = statsOpen ? 'block' : 'none';
    if(!books.length){
      el.innerHTML = '<div class="chart-card"><h3>Charts</h3><p style="font-size:.85rem;color:var(--ink-soft)">Add some stories first and the charts will appear here.</p></div>';
      return;
    }
    var html = '';
    var donutSize = statsOpen ? 170 : 110;

    var stParts = ['reading','want','finished','dropped'].map(function(k){
      return { key:k, label: STATUSES[k], color: ST_COLORS[k], n: books.filter(function(b){ return b.status===k; }).length };
    }).filter(function(p){ return p.n>0; });
    var stTotal = stParts.reduce(function(a,p){ return a+p.n; },0);
    html += '<div class="chart-card"><h3>Status overview</h3><div class="donut-wrap">'
      + donutSvg(stParts, donutSize) + legendHtml(stParts, stTotal, 'status') + '</div></div>';

    var tpParts = ['novel','manhwa','manhua','manga'].map(function(k){
      return { key:k, label: TYPES[k], color: TP_COLORS[k], n: books.filter(function(b){ return (b.type||'novel')===k; }).length };
    }).filter(function(p){ return p.n>0; });
    var tpTotal = tpParts.reduce(function(a,p){ return a+p.n; },0);
    html += '<div class="chart-card"><h3>Story types</h3><div class="donut-wrap">'
      + donutSvg(tpParts, donutSize) + legendHtml(tpParts, tpTotal, 'type') + '</div></div>';

    var rc = [0,0,0,0,0], rated = 0, zeroCount = 0;
    books.forEach(function(b){
      if(b.zero){ zeroCount++; rated++; return; }
      if(b.rating >= 0.5 && b.rating <= 5){
        var bucket = Math.min(5, Math.max(1, Math.round(b.rating)));
        rc[bucket-1]++; rated++;
      }
    });
    if(rated){
      var bars = rc.map(function(n,i){ return { n:n, label:(i+1)+'&#9733;' }; });
      if(zeroCount) bars.unshift({ n:zeroCount, label:'0&#9733;' });
      var maxR = Math.max.apply(null, bars.map(function(x){ return x.n; })) || 1;
      html += '<div class="chart-card"><h3>Ratings</h3><div class="vbars"'+(statsOpen?' style="height:150px;max-width:420px"':'')+'>'
        + bars.map(function(x){
            var h = Math.round(x.n/maxR*100);
            return '<div class="vbar"><div class="vb-n">'+(x.n||'')+'</div>'
              +'<div class="vb-fill" style="height:'+(x.n? Math.max(h,4):2)+'%"></div>'
              +'<div class="vb-l">'+x.label+'</div></div>';
          }).join('')
        + '</div></div>';
    }

    var gs = allGenres().slice(0,8);
    if(gs.length){
      var totalStories = books.length || 1;
      html += '<div class="chart-card"><h3>Top genres / tags</h3>'
        + gs.map(function(g){
            var pw = Math.max(4, Math.round(g.n/totalStories*100));
            var pctLabel = Math.round(g.n/totalStories*100);
            return '<div class="hbar-click" data-kind="tag" data-key="'+esc(g.label)+'" title="See these stories">'
              +'<div class="hbar"><div class="hb-label"><span>'+esc(g.label)+'</span><span class="n">'+g.n+' \u00B7 '+pctLabel+'%</span></div>'
              +'<div class="hb-track"><div class="hb-fill" style="width:'+pw+'%"></div></div></div></div>';
          }).join('')
        + '</div>';
    }

    // storage meter
    var used = 0;
    try{ used = (localStorage.getItem(KEY) || '').length * 2; }catch(e){}
    var cap = 5 * 1024 * 1024;
    var usedPct = Math.min(100, Math.max(1, Math.round(used / cap * 100)));
    var usedTxt = used > 1024*1024 ? (used/1048576).toFixed(2) + ' MB' : Math.max(1, Math.round(used/1024)) + ' KB';
    html += '<div class="chart-card"><h3>Storage</h3>'
      + '<div class="storage-bar"><span style="width:'+usedPct+'%"></span></div>'
      + '<div class="storage-txt">'+usedTxt+' used of ~5 MB &middot; plenty of room</div>'
      + '</div>';

    el.innerHTML = html;
  }

  function saveBook(){
    var title = $('fTitle').value.trim();

    var now = Date.now();
    var data = {
      title: title,
      author: $('fAuthor').value.trim(),
      link: $('fLink').value.trim(),
      status: curStatus,
      type: curType,
      chCur: parseInt($('fChCur').value,10) || 0,

      dateStart: $('fStart').value || '',
      dateEnd: $('fEnd').value || '',
      notes: $('fNotes').value.trim(),
      review: $('fReview').value.trim(),
      updated: now
    };

      for(var i=0;i<books.length;i++){

          break;

      }

  /* ---------- export / import ---------- */
  function doExport(){
    if(!books.length){ toast('Nothing to export yet'); return; }
    var blob = new Blob([JSON.stringify({ app:'reading_list', version:1, exported:new Date().toISOString(), books:books }, null, 2)], { type:'application/json' });
    var a = document.createElement('a');
    var d = new Date();
    var stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    a.href = URL.createObjectURL(blob);
    a.download = 'ReadingList_Backup_' + stamp + '.json';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 500);
    toast('Backup downloaded');
  }

  function doImport(file){
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var obj = JSON.parse(reader.result);
        var incoming = Array.isArray(obj) ? obj : (obj && Array.isArray(obj.books) ? obj.books : null);
        if(!incoming) throw new Error('bad');
        var mode = confirm('OK = MERGE with current list (skip duplicates by title)\nCancel = REPLACE everything with the backup');
        var addedCount = 0;
        if(mode){
          var titles = {};
          books.forEach(function(b){ titles[b.title.toLowerCase()] = true; });
          incoming.forEach(function(b){
            if(b && b.title && !titles[String(b.title).toLowerCase()]){
              if(!b.id) b.id = uid();
              books.push(b); addedCount++;
            }
          });
          toast('Merged: '+addedCount+' new stor'+(addedCount===1?'y':'ies'));
        }else{
          books = incoming.filter(function(b){ return b && b.title; });
          books.forEach(function(b){ if(!b.id) b.id = uid(); });
          toast('Replaced with backup ('+books.length+' stories)');
        }
        save(); renderAll();
      }catch(e){
        toast('Could not read that file');
      }
    };
    reader.readAsText(file);
  }

  function renderReviewHtml(txt){
    // escape first, then light markdown: # heading, - lists, **bold**, *italic*, paragraphs
    var safe = esc(txt);
    safe = safe.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    safe = safe.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    var blocks = safe.split(/\n\s*\n/);
    return blocks.map(function(block){
      var lines = block.split('\n');
      // bullet list block: every non-empty line starts with "- "
      var isList = lines.length && lines.every(function(l){ return /^\s*-\s+/.test(l) || !l.trim(); });
      if(isList){
        return '<ul>' + lines.filter(function(l){ return l.trim(); }).map(function(l){
          return '<li>' + l.replace(/^\s*-\s+/, '') + '</li>';
        }).join('') + '</ul>';
      }
      // heading line(s): handle leading "# "
      var out = '', body = [];
      lines.forEach(function(l){
        if(/^\s*#\s+/.test(l)){
          if(body.length){ out += '<p>' + body.join('<br>') + '</p>'; body = []; }
          out += '<h4>' + l.replace(/^\s*#\s+/, '') + '</h4>';
        }else{
          body.push(l);
        }
      });
      if(body.length) out += '<p>' + body.join('<br>') + '</p>';
      return out;
    }).join('');
  }

  function mdWrap(before, after, placeholder){
    var ta = $('fReview');
    var st = ta.selectionStart, en = ta.selectionEnd, v = ta.value;
    var sel = v.slice(st, en) || placeholder;
    ta.value = v.slice(0, st) + before + sel + after + v.slice(en);
    ta.focus();
    ta.selectionStart = st + before.length;
    ta.selectionEnd = st + before.length + sel.length;
  }
  function mdLinePrefix(prefix){
    var ta = $('fReview');
    var st = ta.selectionStart, en = ta.selectionEnd, v = ta.value;
    var lineStart = v.lastIndexOf('\n', st - 1) + 1;
    var lineEnd = v.indexOf('\n', en); if(lineEnd === -1) lineEnd = v.length;
    var chunk = v.slice(lineStart, lineEnd);
    var newChunk = chunk.split('\n').map(function(l){ return prefix + l; }).join('\n');
    ta.value = v.slice(0, lineStart) + newChunk + v.slice(lineEnd);
    ta.focus();
    ta.selectionStart = lineStart;
    ta.selectionEnd = lineStart + newChunk.length;
  }

  /* ---------- stats drill-down (peek) ---------- */
  var peekKind = null, peekKey = null;
  function peekMatches(kind, key){
    if(kind === 'status') return books.filter(function(b){ return b.status === key; });
    if(kind === 'type') return books.filter(function(b){ return (b.type||'novel') === key; });
    // tag
    var k = key.toLowerCase();
    return books.filter(function(b){
      return (b.genre||'').split(',').some(function(g){ return g.trim().toLowerCase() === k; });
    });
  }
  function peekLabel(kind, key){
    if(kind === 'status') return STATUSES[key];
    if(kind === 'type') return TYPES[key];
    return '\u201C' + key + '\u201D';
  }
  function openPeek(kind, key){
    peekKind = kind; peekKey = key;
    var list = peekMatches(kind, key);
    list.sort(function(a,b){ return (b.updated||0)-(a.updated||0); });
    var shown = list.slice(0,5);
    $('peekTitle').textContent = peekLabel(kind, key) + ' \u00B7 ' + list.length + ' stor' + (list.length===1?'y':'ies');
    $('peekBody').innerHTML = shown.map(function(b){
      return '<div class="peek-row" data-id="'+esc(b.id)+'">'
        + '<span class="bc-type tp-'+esc(b.type||'novel')+'">'+(TYPES[b.type]||'Novel')+'</span>'

        + '</div>';
    }).join('') + (list.length > 5 ? '<div class="peek-more">+ ' + (list.length-5) + ' more</div>' : '');
    $('btnPeekAll').textContent = 'Show all ' + list.length;

  /* ---------- share ---------- */
  var shareMode = 'finished';
  var shareDetail = 'all';
  var shareYear = 'all';
  var SHARE_DEFS = {
    finished: { label: 'Stories I finished', test: function(b){ return b.status === 'finished'; } },
    reading:  { label: 'What I\u2019m reading right now', test: function(b){ return b.status === 'reading'; } },
    loved:    { label: 'Stories I loved', test: function(b){ return (b.rating || 0) >= 4; } },
    want:     { label: 'My want-to-read list', test: function(b){ return b.status === 'want'; } }
  };
  function bookYear(b){
    var d = b.dateEnd || b.dateStart;
    if(d && d.length >= 4) return d.slice(0,4);
    var t = b.added || b.updated;
    return t ? String(new Date(t).getFullYear()) : '';
  }
  function shareList(){
    var arr = books.filter(SHARE_DEFS[shareMode].test);
    if(shareYear !== 'all') arr = arr.filter(function(b){ return bookYear(b) === shareYear; });
    arr.sort(function(a,b){ return (b.rating||0)-(a.rating||0) || (b.updated||0)-(a.updated||0); });
    return arr;
  }
  function cssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || '#000';
  }
  function setShareDetail(d){

    }

  function renderShareYears(){
    var pool = books.filter(SHARE_DEFS[shareMode].test);
    var years = {};
    pool.forEach(function(b){ var y = bookYear(b); if(y) years[y] = (years[y]||0)+1; });
    var keys = Object.keys(years).sort().reverse();
    if(shareYear !== 'all' && keys.indexOf(shareYear) === -1) shareYear = 'all';
    var html = '<button class="chip'+(shareYear==='all'?' active':'')+'" data-y="all">All years<span class="cnt">'+pool.length+'</span></button>';
    html += keys.map(function(y){
      return '<button class="chip'+(shareYear===y?' active':'')+'" data-y="'+y+'">'+y+'<span class="cnt">'+years[y]+'</span></button>';
    }).join('');

  function shareMeta(b){
    var bits = [];
    if(shareDetail === 'title' || shareDetail === 'notes') return '';
    if(shareDetail === 'tags'){
      if(b.genre){
        var g2 = b.genre.split(',').map(function(x){ return x.trim(); }).filter(Boolean).join(', ');
        if(g2) bits.push(g2);
      }
      return bits.join(' \u00B7 ');
    }
    // 'all'
    if(b.author) bits.push(b.author);
    bits.push(TYPES[b.type] || 'Novel');
    if(b.genre){
      var g = b.genre.split(',').slice(0,3).map(function(x){ return x.trim(); }).filter(Boolean).join(', ');
      if(g) bits.push(g);
    }
    if(b.dateStart && b.dateEnd){
      var n = daysBetween(b.dateStart, b.dateEnd);
      if(n) bits.push(n === 1 ? 'read in 1 day' : n + ' days');
    } else if(b.dateEnd){
      bits.push('finished ' + fmtDate(b.dateEnd));
    }
    return bits.join(' \u00B7 ');
  }
  function shareShowNotes(){ return shareDetail === 'notes' || shareDetail === 'all'; }

  function shareAsImage(){
    var list = shareList();
    if(!list.length){ toast('Nothing to share in this list'); return; }
    var W = 800, pad = 40, headH = 120, footH = 54;
    var hasMeta = (shareDetail === 'tags' || shareDetail === 'all');
    var hasNotes = shareShowNotes();
    var rowH = 38 + (hasMeta ? 18 : 0) + (hasNotes ? 18 : 0);
    var H = headH + list.length * rowH + footH;
    var cv = document.createElement('canvas');
    var scale = 2;
    cv.width = W * scale; cv.height = H * scale;
    var ctx = cv.getContext('2d');
    ctx.scale(scale, scale);

    var bg = cssVar('--bg'), card = cssVar('--card'), ink = cssVar('--ink'),
        soft = cssVar('--ink-soft'), accent = cssVar('--accent'), line = cssVar('--line');

    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    // header
    ctx.fillStyle = ink;
    ctx.font = 'bold 30px Georgia, serif';
    ctx.fillText(SHARE_DEFS[shareMode].label + (shareYear !== 'all' ? ' \u00B7 ' + shareYear : ''), pad, 62);
    ctx.fillStyle = accent;
    ctx.fillRect(pad, 76, W - pad*2, 4);
    ctx.fillStyle = soft;
    ctx.font = '15px Verdana, sans-serif';
    var d = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    ctx.fillText(list.length + ' stor' + (list.length===1?'y':'ies') + ' \u00B7 ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear(), pad, 106);

    function trunc(txt, maxW, font){
      ctx.font = font;
      if(ctx.measureText(txt).width <= maxW) return txt;
      while(txt.length > 1 && ctx.measureText(txt + '\u2026').width > maxW) txt = txt.slice(0,-1);
      return txt + '\u2026';
    }

    list.forEach(function(b, i){
      var y = headH + i * rowH;
      ctx.fillStyle = card;
      roundRect(ctx, pad - 12, y + 3, W - (pad-12)*2, rowH - 7, 9);
      ctx.fill();
      var ty = y + 25;
      ctx.fillStyle = ink;
      ctx.font = 'bold 15px Georgia, serif';
      var starsTxt = starsText(b);
      var starW = starsTxt ? ctx.measureText(starsTxt).width + 28 : 0;
      ctx.fillText(trunc(b.title, W - pad*2 - starW - 10, 'bold 15px Georgia, serif'), pad + 4, ty);
      if(starsTxt){
        ctx.fillStyle = accent;
        ctx.font = '14px Georgia, serif';
        ctx.textAlign = 'right';
        ctx.fillText(starsTxt, W - pad - 4, ty);
        ctx.textAlign = 'left';
      }
      var metaTxt = shareMeta(b);
      if(hasMeta && metaTxt){
        ty += 18;
        ctx.fillStyle = soft;
        ctx.font = '11px Verdana, sans-serif';
        ctx.fillText(trunc(metaTxt, W - pad*2 - 10, '11px Verdana, sans-serif'), pad + 4, ty);
      }
      if(hasNotes && b.notes){
        ty += 18;
        ctx.fillStyle = soft;
        ctx.font = 'italic 11px Georgia, serif';
        ctx.fillText(trunc(b.notes, W - pad*2 - 10, 'italic 11px Georgia, serif'), pad + 4, ty);
      }
    });

    // footer
    ctx.fillStyle = soft;
    ctx.font = 'italic 13px Georgia, serif';
    ctx.fillText('from my reading list \u2661', pad, H - 26);

    var a = document.createElement('a');
    var stamp = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    a.download = 'ReadingList_' + shareMode + (shareYear !== 'all' ? '_' + shareYear : '') + '_' + stamp + '.png';
    a.href = cv.toDataURL('image/png');
    document.body.appendChild(a); a.click(); a.remove();
    toast('Image saved');
  }
  function roundRect(ctx, x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function shareAsPdf(){
    var list = shareList();
    if(!list.length){ toast('Nothing to share in this list'); return; }
    var d = new Date();
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var html = '<h1>' + esc(SHARE_DEFS[shareMode].label) + (shareYear !== 'all' ? ' \u00B7 ' + esc(shareYear) : '') + '</h1>'
      + '<div class="pr-sub">' + list.length + ' stor' + (list.length===1?'y':'ies')
      + ' \u00B7 ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear() + '</div>';
    html += list.map(function(b){
      var starsT = starsText(b);
      var stars = starsT ? ' <span class="pr-stars">' + starsT + '</span>' : '';
      var metaTxt = shareMeta(b);
      return '<div class="pr-item"><div class="pr-title">' + esc(b.title) + stars + '</div>'
        + (metaTxt ? '<div class="pr-meta">' + esc(metaTxt) + '</div>' : '')
        + (shareShowNotes() && b.notes ? '<div class="pr-notes">' + esc(b.notes) + '</div>' : '')
        + '</div>';
    }).join('');
    $('printArea').className = (shareDetail === 'title') ? 'pr-titleonly' : '';
    $('printArea').innerHTML = html;
    window.print();
  }

  /* ---------- events ---------- */
  $('fab').addEventListener('click', function(){ openSheet(null); });
  $('closeSheet').addEventListener('click', closeSheet);
  $('btnCancel').addEventListener('click', closeSheet);
  $('btnSave').addEventListener('click', saveBook);
  $('btnDelete').addEventListener('click', deleteBook);
  $('overlay').addEventListener('click', function(e){ if(e.target === this) closeSheet(); });

  $('segStatus').addEventListener('click', function(e){
    var st = e.target.getAttribute && e.target.getAttribute('data-st');
    if(st) setStatus(st);
  });
  $('segType').addEventListener('click', function(e){
    var tp = e.target.getAttribute && e.target.getAttribute('data-tp');
    if(tp) setType(tp);
  });
  $('starInput').addEventListener('click', function(e){
    var v = e.target.getAttribute && e.target.getAttribute('data-v');
    if(v){
      v = Number(v);
      setRating(curRating === v ? v - 0.5 : v, false);
      return;
    }
    if(e.target.id === 'zeroBtn'){
      setRating(0, !curZero);
    }
  });
  $('clearRating').addEventListener('click', function(){ setRating(0, false); });

  $('chips').addEventListener('click', function(e){
    var f = e.target.closest && e.target.closest('.chip');
    if(f){ filter = f.getAttribute('data-f'); renderChips(); renderList(); }
  });
  $('typeChips').addEventListener('click', function(e){
    var f = e.target.closest && e.target.closest('.chip');
    if(f){ typeFilter = f.getAttribute('data-t'); renderTypeChips(); renderList(); }
  });
  $('search').addEventListener('input', function(){ query = this.value.trim(); renderList(); });
  $('sortSel').addEventListener('change', renderList);

  function filterByTag(tag){
    query = tag;
    $('search').value = tag;
    filter = 'all'; typeFilter = 'all';
    renderChips(); renderTypeChips(); renderList();
    window.scrollTo({ top: 0 });
    toast('Showing \u201C' + tag + '\u201D stories \u2014 clear search to see all');
  }
  $('list').addEventListener('click', function(e){
    var tagEl = e.target.closest && e.target.closest('.bc-tag');
    if(tagEl){
      e.stopPropagation();
      filterByTag(tagEl.getAttribute('data-tag'));
      return;
    }
    var card = e.target.closest && e.target.closest('.book-card');
    if(!card) return;
    var id = card.getAttribute('data-id');
    var book = null;
    for(var i=0;i<books.length;i++){ if(books[i].id===id){ book = books[i]; break; } }
    if(book) openView(book);
  });

  var THEME_ORDER = ['light','dark','cinna'];
  var THEME_ICONS = { light:'&#9789;', dark:'&#9788;', cinna:'&#9729;' };
  function applyTheme(t){
    if(THEME_ORDER.indexOf(t) === -1) t = 'light';
    document.documentElement.setAttribute('data-theme', t);
    $('btnTheme').innerHTML = THEME_ICONS[t];
    $('hdrIcon').innerHTML = (t === 'cinna') ? '&#9729;&#65039;' : '&#128214;';
  }
  (function initTheme(){
    var saved = null;
    try{ saved = localStorage.getItem(THEME_KEY); }catch(e){}
    if(!saved){
      saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    applyTheme(saved);
  })();
  $('btnTheme').addEventListener('click', function(){
    var cur = document.documentElement.getAttribute('data-theme') || 'light';
    var idx = THEME_ORDER.indexOf(cur);
    var next = THEME_ORDER[(idx + 1) % THEME_ORDER.length];
    applyTheme(next);
    try{ localStorage.setItem(THEME_KEY, next); }catch(e){}
  });

  $('btnStats').addEventListener('click', function(){
    statsOpen = !statsOpen;
    this.classList.toggle('btnStats-on', statsOpen);
    this.textContent = statsOpen ? 'Back' : 'Stats';
    renderStatsPanel();
    window.scrollTo({top:0});
  });
  $('viewBody').addEventListener('click', function(e){
    var tagEl = e.target.closest && e.target.closest('.bc-tag');
    if(tagEl){
      closeView();
      filterByTag(tagEl.getAttribute('data-tag'));
    }
  });
  $('revToolbar').addEventListener('click', function(e){
    var btn = e.target.closest && e.target.closest('button');
    if(!btn) return;
    if(btn.id === 'revPreviewBtn'){ setRevPreview(!revPreviewOn); return; }
    if(revPreviewOn) setRevPreview(false);
    var kind = btn.getAttribute('data-md');
    if(kind === 'bold') mdWrap('**','**','bold text');
    else if(kind === 'italic') mdWrap('*','*','italic text');
    else if(kind === 'heading') mdLinePrefix('# ');
    else if(kind === 'list') mdLinePrefix('- ');
  });

  $('closeView').addEventListener('click', closeView);
  $('btnViewClose').addEventListener('click', closeView);
  $('viewOverlay').addEventListener('click', function(e){ if(e.target === this) closeView(); });
  $('btnViewEdit').addEventListener('click', function(){
    var book = null;
    for(var i=0;i<books.length;i++){ if(books[i].id === viewId){ book = books[i]; break; } }
    closeView();
    if(book) openSheet(book);
  });

  $('statsPanel').addEventListener('click', function(e){
    var t = e.target.closest && e.target.closest('.lg-item, .hbar-click');
    if(t) openPeek(t.getAttribute('data-kind'), t.getAttribute('data-key'));
  });
  $('closePeek').addEventListener('click', closePeek);
  $('btnPeekClose').addEventListener('click', closePeek);
  $('peekOverlay').addEventListener('click', function(e){ if(e.target === this) closePeek(); });
  $('btnPeekAll').addEventListener('click', peekShowAll);
  $('peekBody').addEventListener('click', function(e){
    var row = e.target.closest && e.target.closest('.peek-row');
    if(!row) return;
    var id = row.getAttribute('data-id');
    var book = null;
    for(var i=0;i<books.length;i++){ if(books[i].id===id){ book = books[i]; break; } }
    if(book){ closePeek(); openView(book); }
  });

  $('btnShare').addEventListener('click', function(){
    setShareMode(shareMode);
    $('shareOverlay').classList.add('open');
  });
  $('closeShare').addEventListener('click', function(){ $('shareOverlay').classList.remove('open'); });
  $('shareOverlay').addEventListener('click', function(e){ if(e.target === this) this.classList.remove('open'); });
  $('segShare').addEventListener('click', function(e){
    var m = e.target.getAttribute && e.target.getAttribute('data-sh');
    if(m) setShareMode(m);
  });
  $('shareYears').addEventListener('click', function(e){
    var chip = e.target.closest && e.target.closest('.chip');
    if(chip){
      shareYear = chip.getAttribute('data-y');
      renderShareYears();
      refreshShareCount();
    }
  });
  $('segDetail').addEventListener('click', function(e){
    var d = e.target.getAttribute && e.target.getAttribute('data-dt');
    if(d) setShareDetail(d);
  });
  $('btnShareImg').addEventListener('click', shareAsImage);
  $('btnSharePdf').addEventListener('click', shareAsPdf);

  $('btnExport').addEventListener('click', doExport);
  $('btnImport').addEventListener('click', function(){ $('fileImport').click(); });
  $('fileImport').addEventListener('change', function(){
    if(this.files && this.files[0]) doImport(this.files[0]);
    this.value = '';
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){
      if($('overlay').classList.contains('open')) closeSheet();
      $('shareOverlay').classList.remove('open');
      closeView();
      closePeek();
    }
  });

  function updateChipFades(){
    ['chips','typeChips'].forEach(function(id){
      var el = $(id);
      if(!el) return;
      var atEnd = el.scrollWidth - el.scrollLeft - el.clientWidth < 6;
      el.classList.toggle('at-end', atEnd);
    });
  }
  $('chips').addEventListener('scroll', updateChipFades, { passive:true });
  $('typeChips').addEventListener('scroll', updateChipFades, { passive:true });
  window.addEventListener('resize', updateChipFades);
  var _renderChips = renderChips, _renderTypeChips = renderTypeChips;
  renderChips = function(){ _renderChips(); updateChipFades(); };
  renderTypeChips = function(){ _renderTypeChips(); updateChipFades(); };

  renderAll();
  updateChipFades();
})();
</script>
